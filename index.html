<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0f0f0f">
    <meta name="description" content="A GitHub Pages compatible YouTube Music style PWA.">
    <title>PulseTube Music</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="assets/icons/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="assets/icons/icon-192.svg">
    <link rel="stylesheet" href="css/themes.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/player.css">
  </head>
  <body>
    <a class="skip-link" href="#mainContent">Skip to content</a>
    <div class="app-shell" data-mode="music">
      <aside class="sidebar" aria-label="Primary">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true"></span>
          <span>PulseTube</span>
        </div>
        <nav class="nav-list" id="primaryTabs">
          <button class="nav-item is-active" data-page="home" aria-current="page">Home</button>
          <button class="nav-item" data-page="playlists">Playlists</button>
          <button class="nav-item" data-page="likes">Liked</button>
          <button class="nav-item" data-page="watchLater">Watch Later</button>
          <button class="nav-item" data-page="subscriptions">Subscriptions</button>
          <button class="nav-item" data-page="searchPage">Search</button>
        </nav>
        <div class="sidebar-settings">
          <label class="setting-toggle">
            <input id="searchSuggestionsToggle" type="checkbox">
            <span>Enable search suggestions (may increase API usage)</span>
          </label>
        </div>
      </aside>

      <div class="main-area">
        <header class="topbar">
          <button class="icon-button menu-button" id="menuButton" aria-label="Open menu">Menu</button>
          <form class="search-box" id="searchForm" role="search">
            <label class="sr-only" for="searchInput">Search YouTube</label>
            <input id="searchInput" name="q" type="search" placeholder="Search songs, artists, videos" autocomplete="off" aria-autocomplete="list" aria-controls="searchSuggestions">
            <button class="icon-button" type="submit" aria-label="Search">Go</button>
            <div class="search-suggestions" id="searchSuggestions" role="listbox" hidden></div>
          </form>
          <div class="mode-switch" aria-label="Display mode">
            <button class="mode-button is-active" type="button" data-mode-choice="music">Music</button>
            <button class="mode-button" type="button" data-mode-choice="youtube">YouTube</button>
          </div>
          <button class="install-button" id="installButton" type="button" hidden>Install</button>
          <button class="profile-button" id="loginButton" type="button">Sign in</button>
        </header>

        <main id="mainContent" class="content" tabindex="-1">
          <section class="notice-region" id="noticeRegion" aria-live="polite"></section>
          <section class="page-heading">
            <p class="eyebrow" id="pageEyebrow">Music Mode</p>
            <h1 id="pageTitle">Home</h1>
          </section>
          <section id="pageContent" class="page-content" aria-busy="false"></section>
        </main>
      </div>
    </div>

    <section class="now-playing" aria-label="Player">
      <div id="playerHost" class="player-host" aria-hidden="true"></div>
      <div class="track-meta">
        <img id="trackThumb" src="assets/images/placeholder.svg" alt="" width="56" height="56">
        <div>
          <p id="trackTitle">Nothing playing</p>
          <p id="trackChannel">Choose a video or playlist</p>
        </div>
      </div>
      <div class="player-controls">
        <button class="icon-button" id="shuffleButton" type="button" aria-label="Shuffle">Shf</button>
        <button class="icon-button" id="prevButton" type="button" aria-label="Previous">Prev</button>
        <button class="play-button" id="playButton" type="button" aria-label="Play">Play</button>
        <button class="icon-button" id="nextButton" type="button" aria-label="Next">Next</button>
        <button class="icon-button" id="repeatButton" type="button" aria-label="Repeat">Rpt</button>
      </div>
      <div class="seek-wrap">
        <span id="currentTime">0:00</span>
        <input id="seekRange" type="range" min="0" max="100" value="0" aria-label="Seek">
        <span id="durationTime">0:00</span>
      </div>
    </section>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://www.youtube.com/iframe_api" async></script>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
